<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expulsado del Examen</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #f8d9da;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.1);
            text-align:center;
            max-width:600px;
        }

        .icon{
            font-size:60px;
            margin-bottom:20px;
        }

        h1{
            color:#c0392b;
            margin-bottom:20px;
        }

        p{
            color:#555;
            font-size:18px;
            margin-bottom:30px;
            line-height:1.6;
        }

        .button{
            display:inline-block;
            background:#c0392b;
            color:white;
            padding:15px 25px;
            border-radius:10px;
            text-decoration:none;
            font-weight:bold;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="icon">🚫</div>
    <h1>Usted ha sido expulsado</h1>
    <p>Usted ha sido expulsado por copiar y no seguir las reglas del examen. El examen ha finalizado y ya no puede responder las demás preguntas.</p>
    <a class="button" href="/">Volver al inicio</a>
</div>
</body>
</html>
