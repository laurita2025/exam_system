<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso al Examen</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            width:400px;
            padding:40px;
            border-radius:15px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.3);
            text-align:center;
        }

        .logo{
            font-size:50px;
            margin-bottom:15px;
        }

        h1{
            margin-bottom:10px;
            color:#333;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        .input-group{
            margin-bottom:20px;
            text-align:left;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#444;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            transition:0.3s;
        }

        .input-group input:focus{
            border-color:#2c5364;
            box-shadow:0px 0px 8px rgba(44,83,100,0.4);
        }

        button{
            width:100%;
            padding:12px;
            background:#2c5364;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#203a43;
        }

        .footer{
            margin-top:20px;
            font-size:13px;
            color:#777;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">📝</div>

        <h1>Ingreso al Examen</h1>
        <p>Complete sus datos para iniciar</p>

        <form method="POST" action="/login">
            
            <div class="input-group">
                <label>Nombre completo</label>
                <input type="text" name="name" placeholder="Ingrese su nombre" required>
            </div>

            <div class="input-group">
                <label>Carnet</label>
                <input type="text" name="carnet" placeholder="Ingrese su carnet" required>
            </div>

            <button type="submit">Ingresar al examen</button>
        </form>

        <div class="footer">
            Sistema de Evaluación Online © 2026
        </div>
    </div>

</body>
</html>
